name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # mlx-lm only ships macOS wheels, so the suite must run on an Apple
    # Silicon runner even though most tests mock the model out.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run ty check
      - run: uv run pytest
